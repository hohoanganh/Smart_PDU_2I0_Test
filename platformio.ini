; PlatformIO config - Smart PDU 2I0 test firmware (STM32L151CBT6)
; Build:   pio run
; Nap:     pio run -t upload      (ST-Link)
; Monitor: pio device monitor

[platformio]
default_envs = smart_pdu

[env:smart_pdu]
platform  = ststm32
; Board tu dinh nghia trong boards/genericSTM32L151CB.json
board     = genericSTM32L151CB
framework = arduino

build_flags =
    -Wall

upload_protocol = stlink
monitor_speed = 115200
monitor_echo  = yes
; monitor_port = COM11
